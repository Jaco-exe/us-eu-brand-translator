<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Brand Translator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .back-link {
            text-decoration: none;
            color: #3b82f6;
            font-size: 14px;
        }

        .api-tool-card label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .submit-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .loading-spinner {
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-left: 5px solid #3b82f6;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Back to Directory</a>
    
    <h2>AI Brand Translator</h2>
    <p class="subtitle">Find the European equivalent of any American brand!</p>

    <div class="api-tool-card">
        <label for="brandInput">American Brand:</label>
        <div class="search-row">
            <input type="text" id="brandInput" placeholder="e.g., Target, Tylenol, CVS...">
            <button type="button" onclick="findBrand()">Translate 🌍</button>
        </div>

        <div id="loadingIndicator" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <p>Asking the AI...</p>
        </div>

        <div id="resultBox" class="result-box">
            <h3>European Equivalent:</h3>
            <p id="resultText"></p>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
