<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Brand Translator</title>
    <style>
        :root {
            --bg-color: #313338;
            --container-bg: #2b2d31;
            --text-color: #dbdee1;
            --heading-color: #ffffff;
            --accent-color: #5865F2;
            --accent-hover: #4752C4;
            --input-bg: #1e1f22;
            --border-color: #1e1f22;
            --secondary-bg: #232428;
            --button-secondary: #4e5058;
            --button-secondary-hover: #6d6f78;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .back-link {
            display: inline-block;
            color: #949ba4;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        h2 {
            margin-top: 5px;
            color: var(--heading-color);
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #949ba4;
            font-size: 14px;
            margin-bottom: 25px;
            margin-top: 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--heading-color);
            margin-bottom: 8px;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button.btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        button.btn-primary:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        button.btn-primary:disabled {
            background-color: var(--button-secondary);
            cursor: not-allowed;
            color: #949ba4;
        }

        /* Results Box */
        .result-box {
            background-color: var(--secondary-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            display: none; /* Hidden until button is clicked */
            animation: fadeIn 0.3s ease;
        }

        .result-box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--heading-color);
        }

        .result-box p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
        }

        .result-box strong {
            color: var(--heading-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .search-row {
                flex-direction: column;
            }
            button.btn-primary {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">← Back to Directory</a>
        
        <h2>AI Brand Translator 🌍</h2>
        <p class="subtitle">Find the European equivalent of any American brand.</p>

        <div class="input-group">
            <label for="brandInput">American Brand</label>
            <div class="search-row">
                <input type="text" id="brandInput" placeholder="e.g., Target, Tylenol, CVS..." autocomplete="off">
                <button class="btn-primary" id="translateBtn" onclick="findBrand()">Translate</button>
            </div>
        </div>

        <div id="resultBox" class="result-box">
            <h3>European Equivalent:</h3>
            <p id="resultText"></p>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
