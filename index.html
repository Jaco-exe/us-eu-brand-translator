
<div class="container">
    <a href="index.html" class="back-link">← Back to Directory</a>
    
    <h2>AI Brand Translator</h2>
    <p class="subtitle">Find the European equivalent of any American brand.</p>

    <div class="api-tool-card">
        <label for="brandInput">American Brand:</label>
        <div class="search-row">
            <input type="text" id="brandInput" placeholder="e.g., Target, Tylenol, CVS..." onkeypress="handleKeyPress(event)">
            <button class="submit-btn" id="searchBtn" onclick="findBrand()">Translate 🌍</button>
        </div>

        <div id="loadingIndicator" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <p>Asking the AI...</p>
        </div>

        <div id="resultBox" class="result-box" style="display: none;">
            <h3 id="resultTitle">European Equivalent:</h3>
            <p id="resultText"></p>
        </div>
    </div>
</div>
